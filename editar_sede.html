<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Sede - Proyecto PEC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 500px;">
        <h2 class="mb-4">Modificar Sede</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de la Sede</label>
                <input type="text" name="nombre_sede" class="form-content form-control" value="{{ sede.nombre_sede }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ubicación</label>
                <input type="text" name="ubicacion" class="form-control" value="{{ sede.ubicacion }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
