<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Actividad - Proyecto PEC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
        <h2 class="mb-4">Modificar Actividad Comunitaria</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de la Actividad</label>
                <input type="text" name="nombre_actividad" class="form-control" value="{{ actividad.nombre_actividad }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ actividad.descripcion }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha Programada</label>
                <input type="text" name="fecha_programada" class="form-control" value="{{ actividad.fecha_programada }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Parcial</label>
                <input type="text" name="parcial" class="form-control" value="{{ actividad.parcial }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Responsable Asignado</label>
                <select name="id_responsable" class="form-select">
                    {% for r in responsables %}
                    <option value="{{ r.id_responsable }}" {% if r.id_responsable == actividad.id_responsable %}selected{% endif %}>{{ r.nombre_completo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Sede</label>
                <select name="id_sede" class="form-select">
                    {% for s in sedes %}
                    <option value="{{ s.id_sede }}" {% if s.id_sede == actividad.id_sede %}selected{% endif %}>{{ s.nombre_sede }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-success">Actualizar Actividad</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
